<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 리더십 역량 진단 도구 | FLOW~</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent-light: #ff6b81;
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #2d3436;
    --text-light: #636e72;
    --border: #dfe6e9;
    --skill1: #6c5ce7;
    --skill1-light: #a29bfe;
    --skill2: #00b894;
    --skill2-light: #55efc4;
    --skill3: #0984e3;
    --skill3-light: #74b9ff;
    --skill4: #e17055;
    --skill4-light: #fab1a0;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    background: linear-gradient(135deg, var(--primary) 0%, #16213e 50%, #0f3460 100%);
    color: white;
    border-radius: 0 0 24px 24px;
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(233,69,96,0.1) 0%, transparent 60%);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .header h1 {
    font-size: 1.8em;
    font-weight: 700;
    position: relative;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-size: 0.95em;
    opacity: 0.85;
    position: relative;
    font-weight: 300;
  }
  .header .brand {
    font-size: 0.8em;
    opacity: 0.6;
    position: relative;
    margin-top: 12px;
  }
  .header .reference {
    font-size: 0.7em;
    opacity: 0.5;
    position: relative;
    margin-top: 6px;
    line-height: 1.4;
  }

  /* Progress bar */
  .progress-container {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-info .section-name {
    font-size: 0.85em;
    font-weight: 600;
    color: var(--text);
  }
  .progress-info .count {
    font-size: 0.8em;
    color: var(--text-light);
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease, background 0.5s ease;
    width: 0%;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    animation: fadeInUp 0.4s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-card .q-number {
    font-size: 0.75em;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .question-card .q-text {
    font-size: 1.05em;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  /* Likert scale */
  .likert-scale {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .likert-option {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .likert-option:hover {
    border-color: var(--accent-light);
    background: #fff5f6;
  }
  .likert-option.selected {
    border-color: var(--accent);
    background: #fff0f3;
  }
  .likert-option .radio {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 50%;
    margin-right: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .likert-option.selected .radio {
    border-color: var(--accent);
  }
  .likert-option.selected .radio::after {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
  }
  .likert-option .label {
    font-size: 0.9em;
    color: var(--text);
  }
  .likert-option .score {
    margin-left: auto;
    font-size: 0.75em;
    color: var(--text-light);
    font-weight: 500;
  }

  /* Navigation */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
  }
  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { background: #c8d6e5; }
  .btn-primary {
    background: var(--accent);
    color: white;
    flex: 1;
  }
  .btn-primary:hover { background: #d63651; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,69,96,0.3); }
  .btn-primary:disabled { background: #ddd; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Results page */
  .results-container {
    animation: fadeInUp 0.5s ease;
  }
  .results-summary {
    background: linear-gradient(135deg, var(--primary) 0%, #16213e 100%);
    color: white;
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    text-align: center;
    box-shadow: var(--shadow-hover);
  }
  .results-summary h2 {
    font-size: 1.4em;
    margin-bottom: 8px;
  }
  .total-score {
    font-size: 3em;
    font-weight: 900;
    margin: 16px 0;
    background: linear-gradient(135deg, var(--accent-light), #ffd32a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-label {
    font-size: 0.9em;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .level-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.9em;
    margin-top: 8px;
  }

  /* Radar chart canvas */
  .chart-container {
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .chart-container h3 {
    font-size: 1.1em;
    margin-bottom: 16px;
    color: var(--text);
  }
  canvas#radarChart {
    max-width: 400px;
    margin: 0 auto;
  }

  /* Skill detail cards */
  .skill-card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border-left: 4px solid;
  }
  .skill-card.skill-1 { border-left-color: var(--skill1); }
  .skill-card.skill-2 { border-left-color: var(--skill2); }
  .skill-card.skill-3 { border-left-color: var(--skill3); }
  .skill-card.skill-4 { border-left-color: var(--skill4); }

  .skill-card .skill-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .skill-card .skill-name {
    font-size: 1em;
    font-weight: 700;
  }
  .skill-card .skill-score-badge {
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 0.85em;
    font-weight: 700;
    color: white;
  }
  .skill-1 .skill-score-badge { background: var(--skill1); }
  .skill-2 .skill-score-badge { background: var(--skill2); }
  .skill-3 .skill-score-badge { background: var(--skill3); }
  .skill-4 .skill-score-badge { background: var(--skill4); }

  .skill-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .skill-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }
  .skill-1 .skill-bar-fill { background: linear-gradient(90deg, var(--skill1), var(--skill1-light)); }
  .skill-2 .skill-bar-fill { background: linear-gradient(90deg, var(--skill2), var(--skill2-light)); }
  .skill-3 .skill-bar-fill { background: linear-gradient(90deg, var(--skill3), var(--skill3-light)); }
  .skill-4 .skill-bar-fill { background: linear-gradient(90deg, var(--skill4), var(--skill4-light)); }

  .skill-card .insight {
    font-size: 0.85em;
    color: var(--text-light);
    line-height: 1.6;
    margin-top: 8px;
  }
  .skill-card .action-item {
    font-size: 0.85em;
    color: var(--text);
    background: #f8f9fa;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 10px;
    line-height: 1.5;
  }
  .skill-card .action-item strong {
    color: var(--accent);
  }

  /* Interpretation section */
  .interpretation {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .interpretation h3 {
    font-size: 1.05em;
    margin-bottom: 12px;
    color: var(--text);
  }
  .interpretation p {
    font-size: 0.9em;
    color: var(--text-light);
    line-height: 1.7;
    margin-bottom: 10px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    font-size: 0.75em;
    color: var(--text-light);
    line-height: 1.6;
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  /* Action buttons in results */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .action-buttons .btn {
    flex: 1;
    min-width: 140px;
    text-align: center;
  }

  /* Intro screen */
  .intro {
    background: var(--card);
    border-radius: 20px;
    padding: 32px;
    box-shadow: var(--shadow);
    animation: fadeInUp 0.5s ease;
  }
  .intro h2 {
    font-size: 1.3em;
    margin-bottom: 16px;
    color: var(--primary);
  }
  .intro p {
    font-size: 0.9em;
    color: var(--text-light);
    line-height: 1.8;
    margin-bottom: 14px;
  }
  .intro .skill-preview {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .intro .skill-preview .sp-item {
    padding: 14px;
    border-radius: 12px;
    border: 2px solid var(--border);
  }
  .intro .skill-preview .sp-item .sp-icon {
    font-size: 1.5em;
    margin-bottom: 6px;
  }
  .intro .skill-preview .sp-item .sp-name {
    font-size: 0.85em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .intro .skill-preview .sp-item .sp-desc {
    font-size: 0.75em;
    color: var(--text-light);
    line-height: 1.4;
  }
  .sp-1 { border-color: var(--skill1) !important; background: rgba(108,92,231,0.05); }
  .sp-2 { border-color: var(--skill2) !important; background: rgba(0,184,148,0.05); }
  .sp-3 { border-color: var(--skill3) !important; background: rgba(9,132,227,0.05); }
  .sp-4 { border-color: var(--skill4) !important; background: rgba(225,112,85,0.05); }

  .info-box {
    background: #f0f3ff;
    border-radius: 12px;
    padding: 16px;
    margin: 16px 0;
    font-size: 0.85em;
    line-height: 1.6;
    color: var(--text);
  }

  /* User info form */
  .user-form {
    margin: 20px 0;
  }
  .form-row {
    margin-bottom: 12px;
  }
  .form-row label {
    display: block;
    font-size: 0.85em;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text);
  }
  .form-row input, .form-row select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9em;
    transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row select:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Print styles */
  @media print {
    .nav-buttons, .action-buttons, .btn { display: none !important; }
    .header { background: #1a1a2e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: white; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>AI 리더십 역량 진단</h1>

  <div class="brand">FLOW~ | AI Coordinator 임정훈</div>
  <div class="reference">Based on Bevilacqua et al. (2025, 2026) — Review of Managerial Science & Journal of Business Research</div>
</div>

<div class="container" id="app">

</div>

const LIKERT = [
  { label: '전혀 그렇지 않다', score: 1 },
  { label: '그렇지 않다', score: 2 },
  { label: '보통이다', score: 3 },
  { label: '그렇다', score: 4 },
  { label: '매우 그렇다', score: 5 },
];

let currentScreen = 'intro'; // intro, questions, results
let currentQuestion = 0;
let answers = {};
let userName = '';
let userRole = '';
let userIndustry = '';

const totalQuestions = SKILLS.reduce((sum, s) => sum + s.questions.length, 0);

function getAllQuestions() {
  const qs = [];
  SKILLS.forEach((skill, si) => {
    skill.questions.forEach((q, qi) => {
      qs.push({ ...q, skillIndex: si, questionIndex: qi, key: `${skill.id}_${qi}` });
    });
  });
  return qs;
}

const allQuestions = getAllQuestions();

function render() {
  const app = document.getElementById('app');
  if (currentScreen === 'intro') renderIntro(app);
  else if (currentScreen === 'questions') renderQuestion(app);
  else if (currentScreen === 'results') renderResults(app);
}

function renderIntro(app) {
  app.innerHTML = `

function startDiagnosis() {
  userName = document.getElementById('userName').value || '응답자';
  userRole = document.getElementById('userRole').value || '미지정';
  userIndustry = document.getElementById('userIndustry').value || '미지정';
  currentScreen = 'questions';
  currentQuestion = 0;
  render();
}

function renderQuestion(app) {
  const q = allQuestions[currentQuestion];
  const skill = SKILLS[q.skillIndex];
  const progress = ((currentQuestion) / totalQuestions * 100);
  const sectionStart = allQuestions.findIndex(x => x.skillIndex === q.skillIndex);
  const sectionNum = q.questionIndex + 1;
  const sectionTotal = skill.questions.length;

  const colors = [
    'linear-gradient(90deg, #6c5ce7, #a29bfe)',
    'linear-gradient(90deg, #00b894, #55efc4)',
    'linear-gradient(90deg, #0984e3, #74b9ff)',
    'linear-gradient(90deg, #e17055, #fab1a0)',
  ];

  app.innerHTML = `
    <div class="progress-container">
      <div class="progress-info">
        <span class="section-name">${skill.icon} ${skill.nameKo}</span>
        <span class="count">${currentQuestion + 1} / ${totalQuestions}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%; background: ${colors[q.skillIndex]}"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="q-number">QUESTION ${currentQuestion + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="likert-scale">
        ${LIKERT.map((opt, i) => `
          <div class="likert-option ${answers[q.key] === opt.score ? 'selected' : ''}"
               onclick="selectAnswer('${q.key}', ${opt.score})">
            <div class="radio"></div>
            <span class="label">${opt.label}</span>
            <span class="score">${opt.score}점</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="nav-buttons">
      ${currentQuestion > 0 ? '<button class="btn btn-secondary" onclick="prevQuestion()">이전</button>' : '<div></div>'}
      <button class="btn btn-primary" onclick="nextQuestion()" ${!answers[q.key] ? 'disabled' : ''}>
        ${currentQuestion === totalQuestions - 1 ? '결과 보기' : '다음'}
      </button>
    </div>
  `;
}

function selectAnswer(key, score) {
  answers[key] = score;
  render();
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    render();
  }
}

function nextQuestion() {
  const q = allQuestions[currentQuestion];
  if (!answers[q.key]) return;

  if (currentQuestion < totalQuestions - 1) {
    currentQuestion++;
    render();
  } else {
    currentScreen = 'results';
    render();
  }
}

function getSkillScores() {
  return SKILLS.map((skill, si) => {
    const qs = allQuestions.filter(q => q.skillIndex === si);
    const total = qs.reduce((sum, q) => sum + (answers[q.key] || 0), 0);
    const max = qs.length * 5;
    const avg = total / qs.length;
    const pct = (total / max * 100).toFixed(0);
    return { skill, total, max, avg, pct: Number(pct), count: qs.length };
  });
}

function drawRadarChart(scores) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = 380;
  const H = canvas.height = 380;
  const cx = W / 2;
  const cy = H / 2;
  const R = 140;
  const n = 4;
  const angles = scores.map((_, i) => (Math.PI * 2 * i / n) - Math.PI / 2);

  ctx.clearRect(0, 0, W, H);

  // Draw grid
  for (let level = 1; level <= 5; level++) {
    const r = R * level / 5;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = angles[i % n];
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Level labels
    if (level <= 5) {
      ctx.fillStyle = '#bbb';
      ctx.font = '10px Noto Sans KR';
      ctx.fillText(level.toString(), cx + 4, cy - r + 12);
    }
  }

  // Draw axes
  angles.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Draw data
  ctx.beginPath();
  scores.forEach((s, i) => {
    const r = R * s.avg / 5;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
  ctx.fill();
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Draw points and labels
  const colors = ['#6c5ce7', '#00b894', '#0984e3', '#e17055'];
  const labels = ['AI Open\nMindset', 'AI Strategic\nCo-Thinker', 'Multi-Level\nConnector', 'Ethics & Risk\nManagement'];

  scores.forEach((s, i) => {
    const r = R * s.avg / 5;
    const x = cx + r * Math.cos(angles[i]);
    const y = cy + r * Math.sin(angles[i]);

    // Point
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Score text
    ctx.fillStyle = colors[i];
    ctx.font = 'bold 13px Noto Sans KR';
    const scoreText = s.avg.toFixed(1);
    const stw = ctx.measureText(scoreText).width;
    ctx.fillText(scoreText, x - stw/2, y - 12);

    // Label
    const labelR = R + 40;
    const lx = cx + labelR * Math.cos(angles[i]);
    const ly = cy + labelR * Math.sin(angles[i]);
    ctx.fillStyle = '#333';
    ctx.font = '11px Noto Sans KR';
    ctx.textAlign = 'center';
    const lines = labels[i].split('\n');
    lines.forEach((line, li) => {
      ctx.fillText(line, lx, ly + li * 14);
    });
    ctx.textAlign = 'start';
  });
}

        <p><strong>강점 영역:</strong> ${strongest.skill.nameKo}(${strongest.avg.toFixed(1)}점) — 이 영역의 경험과 역량을 다른 영역의 개발에 레버리지로 활용하실 수 있습니다.</p>
        <p><strong>개발 우선 영역:</strong> ${weakest.skill.nameKo}(${weakest.avg.toFixed(1)}점) —

          : '이 영역의 집중적 개발이 전체 AI 리더십 역량의 균형을 높이는 데 효과적입니다.'}</p>
        <p style="font-size:0.8em; color:#999; margin-top:16px">※ 이 진단은 자기보고식(self-report) 도구로, 360도 피드백이나 행동 관찰 기반 평가와 병행할 때 더 정확한 결과를 얻을 수 있습니다.</p>
      </div>

      <div class="interpretation">

        <p>이 진단 도구는 Bevilacqua et al.(2025)의 체계적 문헌 리뷰("Enhancing top managers' leadership with AI", Review of Managerial Science)에서 도출된 3가지 연구 주제와, 후속 실증 연구(2026, Journal of Business Research)에서 검증된 4가지 상호의존적 리더십 스킬 프레임워크를 기반으로 합니다.</p>
        <p>상위경영자 이론(Upper Echelons Theory, Hambrick & Mason, 1984)에 근거하여, 최고경영자의 인지적 특성이 조직의 AI 전략과 성과에 미치는 영향을 측정합니다.</p>
